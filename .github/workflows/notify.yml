name: Daily Gym Motivation Triggers

on:
  schedule:
    # 09:00 AM IST (Morning Grind) -> 03:30 UTC
    # Scheduled for 03:00 UTC (08:30 AM IST) to beat GitHub delays
    - cron: '0 3 * * *'
    # 06:00 PM IST (Pre-workout) -> 12:30 UTC
    # Scheduled for 12:00 UTC (05:30 PM IST) to beat GitHub delays
    - cron: '0 12 * * *'
    # 11:00 PM IST (Evening reflection) -> 17:30 UTC
    # Scheduled for 17:00 UTC (10:30 PM IST) to beat GitHub delays
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      eventType:
        description: 'Event Type to Trigger (morning, workout, evening)'
        required: true
        default: 'morning'

jobs:
  trigger_notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Event Type
        id: eventType
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.eventType }}" >> $GITHUB_OUTPUT
          else
            # Determine type based on UTC hour of the schedule trigger
            # 3 UTC (8:30 IST) -> morning
            # 12 UTC (5:30 IST) -> workout
            # 17 UTC (10:30 IST) -> evening
            case "${{ github.event.schedule }}" in
              "0 3 * * *")  echo "type=morning" >> $GITHUB_OUTPUT ;;
              "0 12 * * *") echo "type=workout" >> $GITHUB_OUTPUT ;;
              "0 17 * * *") echo "type=evening" >> $GITHUB_OUTPUT ;;
              *)             echo "type=morning" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Trigger Push API
        env:
          EVENT_TYPE: ${{ steps.eventType.outputs.type || steps.manualType.outputs.type }}
          API_URL: ${{ secrets.PRODUCTION_API_URL }} # e.g. https://your-gym-app.vercel.app/api/notifications/trigger
          APP_SECRET: ${{ secrets.NOTIFICATION_SECRET }}
        run: |
          echo "Triggering Notification for: $EVENT_TYPE"
          curl -X POST "$API_URL" \
          -H "Content-Type: application/json" \
          -d "{\"eventType\":\"$EVENT_TYPE\", \"secret\":\"$APP_SECRET\"}" \
          --fail || exit 1
